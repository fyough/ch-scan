name: Scan Channel Range

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Start channel number'
        default: '3000'
        required: false
      end:
        description: 'End channel number'
        default: '4000'
        required: false
      workers:
        description: 'Concurrent workers'
        default: '25'
        required: false
  # schedule:
    # Optional: run every 8 hours. Remove this block if you only want manual runs.
    # - cron: '0 */8 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run channel scan
        run: |
          python scan_channels.py \
            --start "${{ github.event.inputs.start || '3000' }}" \
            --end "${{ github.event.inputs.end || '4000' }}" \
            --workers "${{ github.event.inputs.workers || '25' }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u scan_log.csv
          git diff --quiet --cached || git commit -m "Update channel scan results [skip ci]"
          git push
