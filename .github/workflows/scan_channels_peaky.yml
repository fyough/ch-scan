name: Scan Peaky Channel Range

on:
  workflow_dispatch:
    inputs:
      start:
        description: 'Start channel number'
        default: '1'
        required: false
      end:
        description: 'End channel number'
        default: '200'
        required: false
      workers:
        description: 'Concurrent workers'
        default: '25'
        required: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run channel scan
        run: |
          python scan_channels_peaky.py \
            --start "${{ github.event.inputs.start || '1' }}" \
            --end "${{ github.event.inputs.end || '200' }}" \
            --workers "${{ github.event.inputs.workers || '25' }}"

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist_peaky.m3u scan_log_peaky.csv
          git diff --quiet --cached || git commit -m "Update peaky scan results [skip ci]"
          git push
